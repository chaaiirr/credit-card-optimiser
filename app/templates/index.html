{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold mb-2">Find your optimal card wallet</h1>
<p class="text-gray-500 mb-8">Enter your typical monthly spending and annual income. We'll find the best combination of Singapore credit cards to maximise your rewards.</p>

<form method="POST" action="/optimize" class="bg-white rounded-xl shadow p-6 space-y-6">

  <div>
    <h2 class="font-semibold text-base mb-4">Monthly spending (S$)</h2>
    <div class="grid grid-cols-2 gap-4">
      {% for cat in categories %}
      <div>
        <label class="block text-sm font-medium mb-1 capitalize text-gray-700">{{ cat }}</label>
        <input
          type="number" name="{{ cat }}" min="0" value="0" step="10"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium mb-1 text-gray-700">Annual income (S$)</label>
      <input
        type="number" name="income" min="1" value="60000" step="1000"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1 text-gray-700">Max cards to hold</label>
      <select name="max_cards" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
        <option value="2">2 cards</option>
        <option value="3" selected>3 cards</option>
        <option value="4">4 cards</option>
      </select>
    </div>
  </div>

  <button
    type="submit"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition text-sm"
  >
    Optimise my wallet &rarr;
  </button>
</form>
{% endblock %}
