<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG Card Optimizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <nav class="bg-white border-b px-6 py-4 flex items-center gap-3">
    <a href="/" class="font-bold text-lg text-blue-700">SG Card Optimizer</a>
    <span class="text-gray-400 text-sm">· Maximise your credit card rewards</span>
  </nav>
  <main class="max-w-3xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center text-xs text-gray-400 py-8">
    Card data from MoneySmart &amp; bank websites. Rewards are estimates; verify with your bank.
  </footer>
</body>
</html>
